name: iOS Release

# Gera o build iOS do RapidHub Mobile num runner macOS do GitHub.
#
# Dois modos:
#   • unsigned  → gera um .ipa NÃO assinado (nenhum secret, sem conta Apple paga).
#                 Não vai para App Store/TestFlight, mas instala via sideload
#                 (AltStore, Sideloadly, TrollStore) ou aparelho com jailbreak.
#   • signed    → gera um .ipa assinado, pronto para TestFlight/App Store.
#                 Requer os secrets de assinatura listados mais abaixo.
#
# Disparo:
#   • Manualmente (aba Actions → "iOS Release" → Run workflow), escolhendo o modo.
#   • Ao criar uma tag "v*" (ex.: v1.0.0) → build assinado automático.
#
# ─────────────────────────────────────────────────────────────────────────────
# SECRETS necessários para o modo "signed" (Settings → Secrets and variables →
# Actions → New repository secret):
#
#   BUILD_CERTIFICATE_BASE64        .p12 do certificado de distribuição, em base64
#   P12_PASSWORD                    senha do .p12
#   BUILD_PROVISION_PROFILE_BASE64  .mobileprovision (App Store), em base64
#   PROVISIONING_PROFILE_NAME       nome exato do provisioning profile
#   APPLE_TEAM_ID                   Team ID (10 caracteres) da conta Apple Developer
#   IOS_BUNDLE_ID                   bundle id real (ex.: com.rapidhub.mobile)
#   KEYCHAIN_PASSWORD               qualquer senha (keychain temporário do runner)
#
# (Opcional) Upload automático para o TestFlight — App Store Connect API key:
#   ASC_KEY_ID                      Key ID da API key
#   ASC_ISSUER_ID                   Issuer ID
#   ASC_KEY_BASE64                  arquivo AuthKey_XXXX.p8 em base64
#
# Para gerar um base64 no macOS:  base64 -i arquivo.p12 | pbcopy
# No Windows PowerShell:          [Convert]::ToBase64String([IO.File]::ReadAllBytes("arquivo.p12")) | Set-Clipboard
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Tipo de build"
        type: choice
        default: unsigned
        options:
          - unsigned
          - signed
  push:
    tags:
      - "v*"

env:
  FLUTTER_VERSION: "3.41.9"

jobs:
  build-ios:
    runs-on: macos-14
    # Exposto no nível do job para poder ser lido no `if:` do passo de TestFlight
    # (o contexto `secrets` não é acessível em condições `if`).
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Dependências
        run: flutter pub get

      # Uma tag v* sempre gera build assinado; o disparo manual respeita a escolha.
      - name: Resolver modo
        id: cfg
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "mode=signed" >> "$GITHUB_OUTPUT"
          else
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Modo UNSIGNED ─────────────────────────────────────────────────────
      # Gera um .ipa NÃO assinado (sem conta Apple paga). Não serve para a App
      # Store/TestFlight, mas instala via sideload (AltStore, Sideloadly,
      # TrollStore) ou em aparelho com jailbreak. Empacotamento no estilo do
      # repo AmirBayat0/iOS_iPA: monta Payload/Runner.app e zipa.
      - name: Build iOS (sem assinatura)
        if: steps.cfg.outputs.mode == 'unsigned'
        run: flutter build ios --release --no-codesign

      - name: Empacotar .ipa não assinado
        if: steps.cfg.outputs.mode == 'unsigned'
        working-directory: build/ios/iphoneos
        run: |
          set -euo pipefail
          mkdir -p Payload
          mv Runner.app Payload/
          zip -qq -r -9 rapidhub-unsigned.ipa Payload

      - name: Publicar artefato (.ipa não assinado)
        if: steps.cfg.outputs.mode == 'unsigned'
        uses: actions/upload-artifact@v4
        with:
          name: rapidhub-ios-ipa-unsigned
          path: build/ios/iphoneos/rapidhub-unsigned.ipa
          if-no-files-found: error

      # ── Modo SIGNED: importa certificado + provisioning ───────────────────
      - name: Importar certificado e provisioning
        if: steps.cfg.outputs.mode == 'signed'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Gerar ExportOptions.plist
        if: steps.cfg.outputs.mode == 'signed'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${PROVISIONING_PROFILE_NAME}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

      - name: Build iOS (.ipa assinado)
        if: steps.cfg.outputs.mode == 'signed'
        run: |
          flutter build ipa --release \
            --export-options-plist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Publicar artefato (.ipa)
        if: steps.cfg.outputs.mode == 'signed'
        uses: actions/upload-artifact@v4
        with:
          name: rapidhub-ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

      # ── Upload opcional para o TestFlight ─────────────────────────────────
      - name: Enviar ao TestFlight
        if: steps.cfg.outputs.mode == 'signed' && env.ASC_KEY_ID != ''
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          set -euo pipefail
          KEYS_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEYS_DIR"
          echo "$ASC_KEY_BASE64" | base64 --decode > "$KEYS_DIR/AuthKey_${ASC_KEY_ID}.p8"
          IPA=$(ls build/ios/ipa/*.ipa | head -n1)
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
