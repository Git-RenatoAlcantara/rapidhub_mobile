name: rapidhubmobile
description: A new Flutter project.
publish_to: 'none'

version: 1.0.3+3

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_client_sse: ^2.0.3
  http: ^1.6.0
  flutter_secure_storage: ^10.0.0
  just_audio: ^0.9.46
  video_player: ^2.9.2
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  record: ^6.2.0
  path_provider: ^2.1.5
  mime: ^2.0.0
  http_parser: ^4.1.1
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  window_manager: ^0.5.2
  tray_manager: ^0.5.3
  launch_at_startup: ^0.5.1
  package_info_plus: ^9.0.1
  ffi: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  image_path: "assets/icon/ic_launcher.png"
  android: true
  adaptive_icon_background: "assets/icon/ic_launcher_back.png"
  adaptive_icon_foreground: "assets/icon/ic_launcher_fore.png"
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
  windows:
    generate: true
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - assets/icon/logo.png
    - assets/icon/tray.ico
    - assets/splashscreen.mp4
