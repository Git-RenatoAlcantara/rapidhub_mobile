<script>
        // Micro-interactions for list items
        document.querySelectorAll('.cursor-pointer').forEach(item => {
            item.addEventListener('click', function() {
                this.classList.add('bg-surface-variant');
                setTimeout(() => {
                    this.classList.remove('bg-surface-variant');
                }, 150);
            });
        });

        // Simple scroll behavior for header elevation
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 0) {
                header.classList.add('shadow-lg');
                header.style.backgroundColor = '#151a21';
            } else {
                header.classList.remove('shadow-lg');
                header.style.backgroundColor = '#0a0e14';
            }
        });
